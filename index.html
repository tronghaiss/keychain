<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Keychain Maker Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Agbalumo&family=Baloo+2:wght@700;800&family=Chewy&family=Dancing+Script:wght@700&family=Fredoka:wght@700&family=Inter:wght@400;900&family=Inter+Tight:wght@900&family=Kanit:wght@700;900&family=Merriweather+Sans:wght@800&family=Montserrat:wght@900&family=Noto+Sans:wght@900&family=Noto+Sans+SC:wght@900&family=Nunito:wght@700;900&family=Nunito+Sans:wght@900&family=Open+Sans:wght@800&family=Open+Sans+Condensed:wght@800&family=Oswald:wght@700&family=Pacifico&family=Playfair+Display:ital,wght@1,900&family=Plus+Jakarta+Sans:wght@800&family=Press+Start+2P&family=Raleway:wght@900&family=Roboto:wght@900&family=Roboto+Condensed:wght@900&family=Roboto+Flex:wght@900&family=Roboto+Mono:wght@700&family=Roboto+Serif:wght@900&family=Roboto+Slab:wght@900&family=Rubik:wght@900&family=Source+Sans+3:wght@900&family=Ubuntu+Sans:wght@800&family=Ubuntu+Sans+Mono:wght@700&family=Varela+Round&family=Work+Sans:wght@900&display=swap" rel="stylesheet">
  
  <style>
    body { 
      font-family: 'Inter', system-ui, sans-serif; 
      background-color: #f1f5f9; 
      color: #1e293b;
      overflow-x: hidden; 
    }
    #canvas { 
      image-rendering: auto; 
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      max-width: 100%; 
      height: auto;
    }
    select optgroup { font-weight: bold; color: #334155; }
  </style>
</head>
<body class="min-h-screen pb-40">

  <div class="max-w-md mx-auto px-4">
    <div class="flex flex-col items-center justify-center pt-8 pb-4">
      <h1 class="text-2xl font-black text-slate-800 tracking-tight">Keychain Maker</h1>
      <p class="text-slate-400 text-xs">Thiết kế móc khóa chuyên nghiệp</p>
    </div>

    <div class="flex justify-center mb-6">
      <canvas id="canvas" width="380" height="180"></canvas>
    </div>

    <div class="space-y-5">
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5 ml-1">Tên móc khóa</label>
        <input id="name" type="text" value="Name" 
               class="w-full bg-white border border-slate-200 rounded-2xl px-4 py-4 text-2xl font-black text-center tracking-widest text-slate-800 shadow-sm focus:outline-none focus:ring-2 focus:ring-slate-500"
               oninput="updatePreview()">
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5 ml-1">Kiểu chữ</label>
          <select id="font" onchange="updatePreview()" 
                  class="w-full bg-white border border-slate-200 rounded-xl px-2 py-3 text-sm font-medium shadow-sm focus:outline-none">
            
            <optgroup label="Nghệ thuật & Viết tay">
              <option value="Pacifico">Pacifico</option>
              <option value="Dancing Script">Dancing Script</option>
              <option value="Agbalumo">Agbalumo</option>
              <option value="Playfair Display">Playfair Display</option>
              <option value="Press Start 2P">Pixel 8-bit</option>
            </optgroup>

            <optgroup label="Dễ thương & Tròn trịa">
              <option value="Baloo 2">Baloo 2</option>
              <option value="Chewy">Chewy</option>
              <option value="Fredoka">Fredoka</option>
              <option value="Nunito">Nunito</option>
              <option value="Varela Round">Varela Round</option>
              <option value="Rubik">Rubik</option>
            </optgroup>

            <optgroup label="Hiện đại & Chuyên nghiệp">
              <option value="Noto Sans SC" selected>Noto Sans SC</option>
              <option value="Inter">Inter</option>
              <option value="Inter Tight">Inter Tight</option>
              <option value="Plus Jakarta Sans">Plus Jakarta Sans</option>
              <option value="Montserrat">Montserrat</option>
              <option value="Kanit">Kanit</option>
              <option value="Raleway">Raleway</option>
              <option value="Work Sans">Work Sans</option>
            </optgroup>

            <optgroup label="Cơ bản & Mạnh mẽ">
              <option value="Roboto">Roboto</option>
              <option value="Roboto Condensed">Roboto Condensed</option>
              <option value="Roboto Slab">Roboto Slab</option>
              <option value="Open Sans">Open Sans</option>
              <option value="Oswald">Oswald</option>
              <option value="Ubuntu Sans">Ubuntu Sans</option>
            </optgroup>

            <optgroup label="Máy tính (Monospace)">
              <option value="Roboto Mono">Roboto Mono</option>
              <option value="Ubuntu Sans Mono">Ubuntu Sans Mono</option>
            </optgroup>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5 ml-1">Lỗ khoen</label>
          <select id="holePos" 
                  class="w-full bg-slate-100 border border-slate-200 rounded-xl px-2 py-3 text-sm font-bold text-slate-800 focus:outline-none">
            <option value="Ở TRÊN">Ở TRÊN</option>
            <option value="BÊN TRÁI">BÊN TRÁI</option>
            <option value="KHÔNG">KHÔNG KHOEN</option>
          </select>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5 ml-1">Màu viền</label>
          <select id="borderColor" onchange="updatePreview()" class="w-full bg-white border border-slate-200 rounded-xl px-2 py-3 text-sm shadow-sm">
            <option value="#000000" selected>Đen</option>
            <option value="#ffffff">Trắng</option>
            <option value="#EF4444">Đỏ</option>
            <option value="#7a7a7a">Xám</option>
            <option value="#64eace">Xanh Mint</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5 ml-1">Màu chữ</label>
          <select id="textColor" onchange="updatePreview()" class="w-full bg-white border border-slate-200 rounded-xl px-2 py-3 text-sm shadow-sm">
          <option value="#000000" >Đen</option>
            <option value="#ffffff"selected>Trắng</option>
            <option value="#EF4444">Đỏ</option>
            <option value="#7a7a7a">Xám</option>
            <option value="#64eace">Xanh Mint</option>
          </select>
        </div>
      </div>

      <div>
        <div class="flex justify-between items-center mb-2">
          <label class="text-xs font-bold text-slate-500 uppercase ml-1">Độ dày viền bo</label>
          <span id="borderVal" class="font-mono font-bold text-slate-800 bg-slate-200 px-2 py-1 rounded-lg text-xs">8</span>
        </div>
        <input type="range" id="border" min="8" max="40" value="8" step="1"
               oninput="document.getElementById('borderVal').textContent = this.value; updatePreview()" 
               class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-slate-800">
      </div>

      <div class="text-center py-4 space-y-1">
        <p class="text-slate-600 font-bold text-sm">Hãy lưu ảnh lại và gửi cho chúng mình nhé</p>
        <p class="text-slate-400 text-[11px]">Nếu viền có bị hở trắng nhẹ thì không sao nha</p>
        <p class="text-slate-500 text-xs font-medium">Cảm ơn bạn đã ủng hộ !!</p>
      </div>
    </div>

    <div class="fixed bottom-6 left-0 right-0 max-w-md mx-auto px-6">
      <button onclick="downloadJPG()" 
              class="w-full bg-slate-800 hover:bg-slate-900 text-white py-4 rounded-2xl text-lg font-bold shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-transform">
        <span>📸</span> TẢI ẢNH THIẾT KẾ
      </button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function drawCore(targetCtx, name, font, bColor, tColor, bValue, w, h) {
      targetCtx.clearRect(0, 0, w, h);
      
      const cx = w / 2;
      const cy = h / 2 + 5;
      let baseSize = 85;
      const maxWidth = w - 60;

      targetCtx.letterSpacing = "7px";
      targetCtx.font = `bold ${baseSize}px "${font}"`;
      
      let textWidth = targetCtx.measureText(name).width;
      while (textWidth > maxWidth && baseSize > 10) {
        baseSize -= 2;
        targetCtx.font = `bold ${baseSize}px "${font}"`;
        textWidth = targetCtx.measureText(name).width;
      }

      targetCtx.textAlign = "center";
      targetCtx.textBaseline = "middle";

      // Vẽ viền bo
      const strokeSize = bValue * (baseSize / 20);
      targetCtx.strokeStyle = bColor;
      targetCtx.lineWidth = strokeSize;
      targetCtx.lineJoin = "round";
      targetCtx.lineCap = "round";
      targetCtx.strokeText(name, cx, cy);

      // Vẽ chữ chính
      targetCtx.fillStyle = tColor;
      targetCtx.fillText(name, cx, cy);
      targetCtx.fillText(name, cx, cy - (baseSize * 0.01));
    }

    function updatePreview() {
      const name = document.getElementById('name').value || "Name";
      const font = document.getElementById('font').value;
      const bColor = document.getElementById('borderColor').value;
      const tColor = document.getElementById('textColor').value;
      const bValue = parseFloat(document.getElementById('border').value);

      drawCore(ctx, name, font, bColor, tColor, bValue, canvas.width, canvas.height);
    }

    function downloadJPG() {
      const tempCanvas = document.createElement('canvas');
      const tCtx = tempCanvas.getContext('2d');
      tempCanvas.width = 380;
      tempCanvas.height = 280;

      tCtx.fillStyle = "#FFFFFF";
      tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);

      const name = document.getElementById('name').value || "Name";
      const font = document.getElementById('font').value;
      const bColor = document.getElementById('borderColor').value;
      const tColor = document.getElementById('textColor').value;
      const bValue = parseFloat(document.getElementById('border').value);
      const hole = document.getElementById('holePos').value;

      drawCore(tCtx, name, font, bColor, tColor, bValue, 380, 180);

      tCtx.letterSpacing = "0px";
      tCtx.strokeStyle = "#cbd5e1";
      tCtx.lineWidth = 1;
      tCtx.beginPath();
      tCtx.moveTo(20, 185);
      tCtx.lineTo(360, 185);
      tCtx.stroke();

      tCtx.textAlign = "left";
      tCtx.fillStyle = "#ef4444";
      tCtx.font = "bold 16px Arial";
      tCtx.fillText(`KHOAN: ${hole}`, 25, 215);

      tCtx.fillStyle = "#64748b";
      tCtx.font = "13px Arial";
      tCtx.fillText(`Font: ${font} | Viền bo: ${bValue}`, 25, 240);
      
      const bColorName = document.getElementById('borderColor').options[document.getElementById('borderColor').selectedIndex].text;
      const tColorName = document.getElementById('textColor').options[document.getElementById('textColor').selectedIndex].text;
      tCtx.fillText(`Màu: Viền ${bColorName} / Chữ ${tColorName}`, 25, 260);

      const link = document.createElement('a');
      link.download = `Keychain_${name}.jpg`;
      link.href = tempCanvas.toDataURL('image/jpeg', 0.9);
      link.click();
    }

    document.fonts.ready.then(updatePreview);
  </script>
</body>
</html>
